services:
  bandcampsync:
    image: ghcr.io/meeb/bandcampsync:latest
    container_name: bandcampsync
    restart: unless-stopped
    volumes:
      - ${STORAGE_ROOT}/bronze/bandcampsync:/config
      - ${MEDIA_ROOT}/music:/downloads
    environment:
      - TZ=America/Denver
      - PUID=1000
      - PGID=1000
      - RUN_DAILY_AT=1
    networks:
      - anarchy-pizza

networks:
  anarchy-pizza:
    name: anarchy-pizza
    external: true